name: Sync TwitchDropsMiner  # workflow 名字（随便起）

on:
  schedule:
    - cron: "0 0 * * 0"   # 每周日 UTC 0:00 (北京时间周日上午 8:00) 运行一次
  push:
    branches:
      - "master"         # 当 master 分支有代码推送时依然会触发构建
  pull_request:          # 有 PR 时依然会触发验证
  workflow_dispatch:     # 保持手动触发按钮，方便你随时点击运行

permissions:
  contents: write           # 给 workflow 写仓库的权限（否则 push 会失败）

jobs:
  sync:
    runs-on: ubuntu-latest  # 使用 GitHub 提供的 Linux 环境

    steps:
      # 第一步：拉取你当前仓库代码
      - name: Checkout 当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 拉完整历史（否则 merge 会出问题）

      # 第二步：配置 Git 用户（否则提交会失败）
      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 第三步：同步逻辑（核心）
      - name: 同步 upstream
        run: |
          set -e
          
          # 固定分支为 master，避免动态获取失败 
          BRANCH="master"
          
          # 强制清理并添加上游库 [cite: 70]
          git remote remove upstream || true
          git remote add upstream https://github.com/DevilXD/TwitchDropsMiner.git
          
          # 拉取更新
          git fetch upstream $BRANCH
          
          # 确保在本地 master 分支
          git checkout $BRANCH
          
          # 尝试合并，冲突则强制覆盖
          if git merge upstream/$BRANCH --no-edit; then
            echo "✅ 同步成功"
          else
            echo "⚠️ 检测到冲突，强制覆盖"
            git merge --abort || true
            git reset --hard upstream/$BRANCH
          fi
          
          # 强制推送到自己的仓库
          git push origin $BRANCH --force
